# .gitlab-ci.yml - Private Lab CI/CD Pipeline
# Security Scanner Enterprise Workflow

stages:
  - test
  - security
  - lint

variables:
  PYTHON_VERSION: "3.12"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

image: python:$PYTHON_VERSION

cache:
  paths:
    - .cache/pip
    - .venv/

before_script:
  - python --version
  - pip install virtualenv
  - virtualenv .venv
  - source .venv/bin/activate
  - pip install -e ".[dev,security]"

unit-tests:
  stage: test
  script:
    - pytest --cov=. --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

code-linting:
  stage: lint
  script:
    - ruff check .
    - ruff format --check .
    - mypy .

sast-security-scan:
  stage: security
  script:
    - safety scan --output safety-report.json || true
    - bandit -r src/ -f json -o bandit-report.json || true
  artifacts:
    paths:
      - bandit-report.json
    expire_in: 1 week

# Publish public no es disparado en CI porque es un release local DevSecOps
